<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rádio — 5 Anos no Ar</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #10002e;
    --accent: #ff6b35;
    --accent2: #e040fb;
    --gold: #ffd166;
    --glass: rgba(255,255,255,0.07);
    --glass-border: rgba(255,255,255,0.12);
    --text: #f0e6ff;
    --muted: rgba(240,230,255,0.55);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    overflow: hidden;
  }



  /* ── LAYOUT ── */
  .page {
    position: relative; z-index: 9999;
    display: grid;
    grid-template-columns: 0.7fr 1.6fr 1fr;
    height: 100vh;
    pointer-events: all;
  }

  * { user-select: text; }

  /* ── AO VIVO BADGE ── */
  .aovivo-badge {
    display: inline-flex;
    align-items: center;
    gap: .5rem;
    padding: .45rem .9rem;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,80,80,0.3);
    border-radius: 50px;
    width: fit-content;
  }
  .aovivo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #ff2222;
    animation: pulse 1.4s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50%      { opacity: .25; }
  }
  .aovivo-text {
    font-size: .7rem;
    font-weight: 700;
    letter-spacing: .18em;
    color: #ff3333;
  }

  /* ══════════════ LEFT COLUMN ══════════════ */
  .col-left {
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    padding: 33% 1rem 3rem 30%;
    gap: 1.2rem;
  }

  .left-block {
    position: relative;
    padding: 0.65rem 1.1rem 0.65rem 1.3rem;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
    overflow: hidden;
    z-index: 10000;
    width: max-content;
  }
  .left-block::before {
    content: '';
    position: absolute; top: 0; left: 0;
    width: 4px; height: 100%;
  }
  .left-block:nth-child(2)::before { background: linear-gradient(180deg, var(--accent2), var(--accent)); }
  .left-block:nth-child(3)::before { background: linear-gradient(180deg, var(--gold), var(--accent)); }
  .left-block:nth-child(4)::before { background: linear-gradient(180deg, var(--accent), var(--accent2)); }

  .block-icon { font-size: 1rem; margin-bottom: .15rem; display: block; }

  .block-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.05rem;
    line-height: 1.05;
    letter-spacing: .03em;
    white-space: nowrap;
    background: linear-gradient(135deg, #fff 40%, var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    display: inline-block;
  }
  .left-block:nth-child(3) .block-title {
    background: linear-gradient(135deg, #fff 40%, var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .left-block:nth-child(4) .block-title {
    background: linear-gradient(135deg, #fff 40%, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .block-sub {
    font-size: .66rem;
    color: var(--muted);
    margin-top: .2rem;
    font-weight: 300;
    letter-spacing: .04em;
    white-space: nowrap;
    display: block;
  }

  /* ══════════════ CENTER — EMPTY ══════════════ */
  .col-center {}

  /* ══════════════ RIGHT COLUMN ══════════════ */
  .col-right {
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    padding: 33% 2.5rem 3rem 2rem;
    position: relative;
  }

  .carousel-label {
    font-size: .95rem;
    letter-spacing: .25em;
    text-transform: uppercase;
    color: #fff;
    margin-bottom: 1.2rem;
    text-align: center;
    font-weight: 600;
  }

  /* ── CAROUSEL STAGE ── */
  .carousel-stage {
    position: relative;
    height: 300px;
    perspective: 800px;
  }

  .prog-card {
    position: absolute;
    top: 50%; left: 50%;
    width: 200px;
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.15);
    background: #1a0040;
    cursor: pointer;
    transition: transform .6s cubic-bezier(.4,0,.2,1), opacity .6s ease;
    will-change: transform, opacity;
    transform-origin: center center;
    pointer-events: all;
  }

  .card-body { padding: .8rem 1rem 1rem; }
  .card-time {
    font-size: .66rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: .3rem;
  }
  .card-prog {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: .04em;
    line-height: 1.1;
    color: #fff;
  }
  .card-loc {
    font-size: .75rem;
    color: var(--muted);
    margin-top: .25rem;
    font-weight: 300;
  }
  .card-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    margin-right: .35rem;
    vertical-align: middle;
    animation: blink 1.8s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

  /* CARD POSITIONS */
  .prog-card[data-pos="center"] {
    transform: translate(-50%,-50%) scale(1);
    z-index: 10; opacity: 1;
    box-shadow: 0 12px 40px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.1);
  }
  .prog-card[data-pos="left"] {
    transform: translate(-86%,-50%) scale(.76) rotateY(15deg) translateZ(-50px);
    z-index: 5; opacity: .6;
    box-shadow: 0 6px 20px rgba(0,0,0,.35);
  }
  .prog-card[data-pos="right"] {
    transform: translate(-14%,-50%) scale(.76) rotateY(-15deg) translateZ(-50px);
    z-index: 5; opacity: .6;
    box-shadow: 0 6px 20px rgba(0,0,0,.35);
  }
  .prog-card[data-pos="hidden-left"] {
    transform: translate(-120%,-50%) scale(.55) translateZ(-100px);
    z-index: 1; opacity: 0; pointer-events: none;
  }
  .prog-card[data-pos="hidden-right"] {
    transform: translate(20%,-50%) scale(.55) translateZ(-100px);
    z-index: 1; opacity: 0; pointer-events: none;
  }

  /* ── DOTS ── */
  .carousel-dots {
    display: flex;
    justify-content: center;
    gap: .5rem;
    margin-top: 1.2rem;
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,.2);
    transition: width .35s ease, background .35s ease;
  }
  .dot.active {
    background: var(--accent2);
    width: 20px;
    border-radius: 3px;
  }

  .credits {
    text-align: center;
    font-size: .6rem;
    color: #f1f1f1;
    opacity: .3;
    letter-spacing: .08em;
    margin-top: .8rem;
    font-weight: 300;
  }
</style>
</head>
<body>

<div class="page">

  <!-- ═══ LEFT COLUMN ═══ -->
  <div class="col-left">

    <div class="aovivo-badge" id="aovivoBadge">
      <span class="aovivo-dot"></span>
      <span class="aovivo-text" id="aovivoText">AO VIVO</span>
    </div>

    <div class="left-block">
      <span class="block-icon">🎂</span>
      <div class="block-title">5 Anos Tocando Hits para Você!</div>
      <div class="block-sub">Meia década de música, emoção e histórias inesquecíveis.</div>
    </div>

    <div class="left-block">
      <span class="block-icon">🎶</span>
      <div class="block-title">Música, Amizades e Diversão!</div>
      <div class="block-sub">A trilha sonora da sua vida, todos os dias ao vivo.</div>
    </div>

    <div class="left-block">
      <span class="block-icon">🤝</span>
      <div class="block-title">Respeite os Limites!</div>
      <div class="block-sub">Uma comunidade que cresce com respeito e alegria.</div>
    </div>

  </div>

  <!-- ═══ CENTER — FREE ═══ -->
  <div class="col-center"></div>

  <!-- ═══ RIGHT COLUMN ═══ -->
  <div class="col-right">
    <div class="carousel-label">PROGRAMAÇÃO</div>
    <div class="carousel-stage" id="stage"></div>
    <div class="carousel-dots" id="dots"></div>
    <div class="credits">Feito por Enigm4tico (1491244179)</div>
  </div>

</div>

<script>
const programs = [
  { name:"Hits Sem Limites", dj:"Dani Lins",  time:"Sex: 22h às 00h | Sáb: 20h às 22h", photo:"./1_1.webp" },
  { name:"Top Mix",          dj:"Morgan",     time:"Sex: às 18h",                        photo:"./2.webp"   },
  { name:"Baladas Retro",    dj:"Estrella",   time:"Ter e Qui às 18h",                   photo:"./3.webp"   },
  { name:"Gospel Hits",      dj:"Weberson",   time:"Seg & Ter às 16h",                   photo:"./4.webp"   },
  { name:"Só as Melhores",   dj:"Lennon",     time:"Seg a Sex às 20h",                   photo:"./6.webp"   },
  { name:"Toca Tudo Luan!",  dj:"Luan",       time:"Qua às 18h",                         photo:"./7.webp"   },
  { name:"Sintonia Mix",     dj:"Khels",      time:"Sábado 18h às 20h",                  photo:"./8.webp"   }
];

let current = 0;
let autoTimer;
const INTERVAL = 4000;
const stage  = document.getElementById('stage');
const dotsEl = document.getElementById('dots');

function getPos(i) {
  const len  = programs.length;
  const diff = (i - current + len) % len;
  if (diff === 0)       return 'center';
  if (diff === 1)       return 'right';
  if (diff === len - 1) return 'left';
  return diff < len / 2 ? 'hidden-right' : 'hidden-left';
}

function buildCards() {
  stage.innerHTML = '';
  programs.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'prog-card';
    card.innerHTML = `
      <div style="width:100%;aspect-ratio:1/1;overflow:hidden;border-radius:18px 18px 0 0;">
        <img src="${p.photo}" alt="${p.name}" loading="${i === 0 ? 'eager' : 'lazy'}" style="width:100%;height:100%;object-fit:contain;display:block;">
      </div>
      <div class="card-body">
        <div class="card-time"><span class="card-dot"></span>${p.time}</div>
        <div class="card-prog">${p.name}</div>
        <div class="card-loc">🎙 ${p.dj}</div>
      </div>`;
    stage.appendChild(card);
  });
  updatePositions();
}

function buildDots() {
  dotsEl.innerHTML = '';
  programs.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    dotsEl.appendChild(d);
  });
}

function updatePositions() {
  stage.querySelectorAll('.prog-card').forEach((card, i) => {
    card.dataset.pos = getPos(i);
  });
  dotsEl.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === current);
  });
}

function goTo(idx) {
  current = (idx + programs.length) % programs.length;
  updatePositions();
}

function resetTimer() {
  clearInterval(autoTimer);
  autoTimer = setInterval(() => goTo(current + 1), INTERVAL);
}

buildCards();
buildDots();
resetTimer();

</script>
</body>
</html>
