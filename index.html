<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Céu Pixel Roxo</title><style> * { margin: 0; padding: 0; box-sizing: border-box; } html, body { width: 100%; height: 100%; overflow: hidden; background: #180038; } .sky { position: fixed; inset: 0; overflow: hidden; background: #180038; } .star { position: absolute; width: 2px; height: 2px; background: #f4e9ff; opacity: var(--opacity); animation: blink var(--speed) ease-in-out infinite; } @keyframes blink { 0%, 100% { opacity: var(--opacity); } 50% { opacity: 0.18; } } .shooting-star { position: absolute; width: 2px; height: 2px; background: #ffffff; opacity: 0; animation: shoot-left var(--duration) linear forwards; } .shooting-star::before { content: ""; position: absolute; width: 2px; height: 2px; background: rgba(255, 255, 255, 0.85); } .shooting-star.left::before { left: 8px; top: -5px; box-shadow: 8px -5px rgba(255,255,255,0.65), 16px -10px rgba(255,255,255,0.45), 24px -15px rgba(255,255,255,0.28), 32px -20px rgba(255,255,255,0.14), 40px -25px rgba(255,255,255,0.07); } .shooting-star.right::before { left: -8px; top: -5px; box-shadow: -8px -5px rgba(255,255,255,0.65), -16px -10px rgba(255,255,255,0.45), -24px -15px rgba(255,255,255,0.28), -32px -20px rgba(255,255,255,0.14), -40px -25px rgba(255,255,255,0.07); } @keyframes shoot-left { 0% { opacity: 0; transform: translate(0, 0); } 10% { opacity: 1; } 85% { opacity: 1; } 100% { opacity: 0; transform: translate(-500px, 300px); } } @keyframes shoot-right { 0% { opacity: 0; transform: translate(0, 0); } 10% { opacity: 1; } 85% { opacity: 1; } 100% { opacity: 0; transform: translate(500px, 300px); } } </style></head><body><div class="sky" id="sky"></div><script> const sky = document.getElementById('sky'); const starCount = 150; function random(min, max) { return Math.random() * (max - min) + min; } for (let i = 0; i < starCount; i++) { const star = document.createElement('span'); star.className = 'star'; star.style.left = `${random(0, 100)}vw`; star.style.top = `${random(0, 100)}vh`; star.style.setProperty('--opacity', random(0.35, 1).toFixed(2)); star.style.setProperty('--speed', `${random(2.5, 7)}s`); star.style.animationDelay = `${random(-7, 0)}s`; sky.appendChild(star); } function createShootingStar() { const star = document.createElement('span'); const direction = Math.random() > 0.5 ? 'left' : 'right'; star.className = `shooting-star ${direction}`; if (direction === 'left') { star.style.left = `${random(60, 110)}vw`; } else { star.style.left = `${random(-10, 30)}vw`; star.style.animationName = 'shoot-right'; } star.style.top = `${random(0, 45)}vh`; star.style.setProperty('--duration', `${random(1.2, 2.4)}s`); sky.appendChild(star); star.addEventListener('animationend', () => { star.remove(); }); } function loopShootingStar() { createShootingStar(); const nextTime = random(4000, 12000); setTimeout(loopShootingStar, nextTime); } setTimeout(loopShootingStar, random(1000, 3500)); </script></body></html>
