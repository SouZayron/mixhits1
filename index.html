<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rádio — 5 Anos no Ar</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #10002e;
    --accent: #ff6b35;
    --accent2: #e040fb;
    --gold: #ffd166;
    --glass: rgba(255,255,255,0.06);
    --glass-border: rgba(255,255,255,0.12);
    --text: #f0e6ff;
    --muted: rgba(240,230,255,0.55);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    overflow: hidden;
  }

  /* ── NOISE OVERLAY ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: .5;
  }

  /* ── AMBIENT GLOW ── */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 10% 50%, rgba(224,64,251,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 60% 50% at 90% 50%, rgba(255,107,53,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 50% 100%, rgba(255,209,102,0.10) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  /* ── LAYOUT ── */
  .page {
    position: relative; z-index: 9999;
    display: grid;
    grid-template-columns: 0.7fr 1.6fr 1fr;
    height: 100vh;
    gap: 0;
    pointer-events: all;
  }

  * { user-select: text; }

  /* ── AO VIVO BADGE ── */
  .aovivo-badge {
    display: inline-flex;
    align-items: center;
    gap: .5rem;
    padding: .5rem 1rem;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,80,80,0.25);
    border-radius: 50px;
    backdrop-filter: blur(14px);
    width: fit-content;
    transition: border-color .5s;
  }
  .aovivo-badge.autodj {
    border-color: rgba(255,255,255,0.15);
  }
  .aovivo-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: #ff2222;
    box-shadow: 0 0 6px #ff2222;
    animation: pulse 1.4s ease-in-out infinite;
    transition: background .5s, box-shadow .5s;
  }
  .aovivo-badge.autodj .aovivo-dot {
    background: #a0a0a0;
    box-shadow: 0 0 4px #a0a0a0;
    animation: none;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; box-shadow: 0 0 6px #ff2222; }
    50%      { opacity: .3; box-shadow: none; }
  }
  .aovivo-text {
    font-size: .72rem;
    font-weight: 700;
    letter-spacing: .18em;
    color: #ff3333;
    transition: color .5s;
  }
  .aovivo-badge.autodj .aovivo-text {
    color: #a0a0a0;
  }

  /* ══════════════ LEFT COLUMN ══════════════ */
  .col-left {
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    padding: 33% 1rem 3rem 30%;
    gap: 1.2rem;
  }

  .left-block {
    position: relative;
    padding: 0.7rem 1.2rem 0.7rem 1.4rem;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
    backdrop-filter: blur(16px);
    overflow: hidden;
    pointer-events: all;
    z-index: 10000;
    width: max-content;
  }
  .left-block:hover {}
  .left-block::before {
    content: '';
    position: absolute; top: 0; left: 0;
    width: 4px; height: 100%;
  }
  .left-block:nth-child(2)::before { background: linear-gradient(180deg, var(--accent2), var(--accent)); }
  .left-block:nth-child(3)::before { background: linear-gradient(180deg, var(--gold), var(--accent)); }
  .left-block:nth-child(4)::before { background: linear-gradient(180deg, var(--accent), var(--accent2)); }

  .block-icon {
    font-size: 1.1rem;
    margin-bottom: .2rem;
    display: block;
  }
  .block-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.05rem;
    line-height: 1.05;
    letter-spacing: .03em;
    white-space: nowrap;
    background: linear-gradient(135deg, #fff 40%, var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    display: inline-block;
  }
  .left-block:nth-child(3) .block-title {
    background: linear-gradient(135deg, #fff 40%, var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .left-block:nth-child(4) .block-title {
    background: linear-gradient(135deg, #fff 40%, var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .block-sub {
    font-size: .68rem;
    color: var(--muted);
    margin-top: .25rem;
    font-weight: 300;
    letter-spacing: .04em;
    white-space: nowrap;
    display: block;
  }

  /* ══════════════ CENTER — EMPTY ══════════════ */
  .col-center { /* intentionally empty */ }

  /* ══════════════ RIGHT COLUMN ══════════════ */
  .col-right {
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    padding: 33% 3rem 3rem 2rem;
    position: relative;
  }

  .carousel-label {
    font-size: .95rem;
    letter-spacing: .25em;
    text-transform: uppercase;
    color: #ffffff;
    margin-bottom: 1.2rem;
    text-align: center;
    font-weight: 600;
  }

  /* ── CAROUSEL STAGE ── */
  .carousel-stage {
    position: relative;
    height: 300px;
    perspective: 900px;
  }

  .prog-card {
    position: absolute;
    top: 50%; left: 50%;
    width: 200px;
    border-radius: 22px;
    overflow: hidden;
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px);
    background: var(--glass);
    cursor: pointer;
    transition: all .65s cubic-bezier(.4,0,.2,1);
    will-change: transform, opacity;
    transform-origin: center center;
    pointer-events: all;
  }

  .card-img {
    width: 100%;
    height: 130px;
    object-fit: cover;
    display: block;
  }
  .card-img-placeholder {
    width: 100%;
    height: 130px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3.5rem;
    position: relative;
    overflow: hidden;
  }
  .card-img-placeholder::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(0deg, rgba(16,0,46,.6) 0%, transparent 60%);
  }

  .card-body {
    padding: 1rem 1.1rem 1.2rem;
  }
  .card-time {
    font-size: .68rem;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: .35rem;
  }
  .card-prog {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.35rem;
    letter-spacing: .04em;
    line-height: 1.1;
    color: #fff;
  }
  .card-loc {
    font-size: .78rem;
    color: var(--muted);
    margin-top: .3rem;
    font-weight: 300;
  }
  .card-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    margin-right: .4rem;
    vertical-align: middle;
    animation: blink 1.8s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

  /* CARD POSITIONS */
  .prog-card[data-pos="center"] {
    transform: translate(-50%,-50%) scale(1) translateZ(0px);
    z-index: 10;
    opacity: 1;
    box-shadow: 0 20px 60px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.15), 0 0 60px rgba(224,64,251,.15);
  }
  .prog-card[data-pos="left"] {
    transform: translate(-88%,-50%) scale(.78) rotateY(18deg) translateZ(-60px);
    z-index: 5;
    opacity: .65;
    box-shadow: 0 10px 30px rgba(0,0,0,.4);
  }
  .prog-card[data-pos="right"] {
    transform: translate(-12%,-50%) scale(.78) rotateY(-18deg) translateZ(-60px);
    z-index: 5;
    opacity: .65;
    box-shadow: 0 10px 30px rgba(0,0,0,.4);
  }
  .prog-card[data-pos="hidden-left"] {
    transform: translate(-120%,-50%) scale(.6) rotateY(30deg) translateZ(-120px);
    z-index: 1; opacity: 0; pointer-events: none;
  }
  .prog-card[data-pos="hidden-right"] {
    transform: translate(20%,-50%) scale(.6) rotateY(-30deg) translateZ(-120px);
    z-index: 1; opacity: 0; pointer-events: none;
  }







  /* ── DOTS ── */
  .carousel-dots {
    display: flex;
    justify-content: center;
    gap: .5rem;
    margin-top: 1.4rem;
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,.2);
    transition: all .4s ease;
  }
  .dot.active {
    background: var(--accent2);
    width: 22px;
    border-radius: 3px;
    box-shadow: 0 0 8px var(--accent2);
  }
  .credits {
    text-align: center;
    font-size: .62rem;
    color: #f1f1f1;
    opacity: .35;
    letter-spacing: .08em;
    margin-top: .8rem;
    font-weight: 300;
  }

</style>
</head>
<body>

<div class="page">

  <!-- ═══ LEFT COLUMN ═══ -->
  <div class="col-left">

    <div class="aovivo-badge" id="aovivoBadge">
      <span class="aovivo-dot" id="aovivoDot"></span>
      <span class="aovivo-text" id="aovivoText">AO VIVO</span>
    </div>

    <div class="left-block">
      <span class="block-icon">🎂</span>
      <div class="block-title">5 Anos Tocando Hits para Você!</div>
      <div class="block-sub">Meia década de música, emoção e histórias inesquecíveis.</div>
    </div>

    <div class="left-block">
      <span class="block-icon">🎶</span>
      <div class="block-title">Música, Amizades e Diversão!</div>
      <div class="block-sub">A trilha sonora da sua vida, todos os dias ao vivo.</div>
    </div>

    <div class="left-block">
      <span class="block-icon">🤝</span>
      <div class="block-title">Respeite os Limites!</div>
      <div class="block-sub">Uma comunidade que cresce com respeito e alegria.</div>
    </div>

  </div>

  <!-- ═══ CENTER — FREE ═══ -->
  <div class="col-center"></div>

  <!-- ═══ RIGHT COLUMN ═══ -->
  <div class="col-right">

    <div class="carousel-label">PROGRAMAÇÃO</div>

    <div class="carousel-stage" id="stage"></div>

    <div class="carousel-dots" id="dots"></div>

    <div class="credits">Feito por Enigm4tico (1491244179)</div>

  </div>

</div>

<script>
// ─── PROGRAMS DATA ───
const programs = [
  {
    name: "Hits Sem Limites",
    dj: "Dani Lins",
    time: "Sex: 22h às 00h | Sáb: 20h às 22h",
    photo: "./1_1.webp",
    grad: "linear-gradient(135deg,#ff6b35,#e040fb)"
  },
  {
    name: "Top Mix",
    dj: "Morgan",
    time: "Sex: às 18h",
    photo: "./2.webp",
    grad: "linear-gradient(135deg,#7c4dff,#00bcd4)"
  },
  {
    name: "Baladas Retro",
    dj: "Estrella",
    time: "Ter e Qui às 18h",
    photo: "./3.webp",
    grad: "linear-gradient(135deg,#ffd166,#ff4081)"
  },
  {
    name: "Gospel Hits",
    dj: "Weberson",
    time: "Seg & Ter às 16h",
    photo: "./4.webp",
    grad: "linear-gradient(135deg,#ffd166,#ff8f00)"
  },
  {
    name: "Energia Hits",
    dj: "Venom",
    time: "Segundas às 18h",
    photo: "./5.webp",
    grad: "linear-gradient(135deg,#00e676,#00bcd4)"
  },
  {
    name: "Só as Melhores",
    dj: "Lennon",
    time: "Seg a Sex às 20h",
    photo: "./6.webp",
    grad: "linear-gradient(135deg,#e040fb,#7c4dff)"
  },
  {
    name: "Toca Tudo Luan!",
    dj: "Luan",
    time: "Qua às 18h",
    photo: "./7.webp",
    grad: "linear-gradient(135deg,#ff4081,#ff6b35)"
  },
  {
    name: "Sintonia Mix",
    dj: "Khels",
    time: "Sábado 18h às 20h",
    photo: "./8.webp",
    grad: "linear-gradient(135deg,#1de9b6,#7c4dff)"
  }
];

// ─── CAROUSEL STATE ───
let current = 0;
let autoTimer;
const INTERVAL = 4000;

const stage = document.getElementById('stage');
const dotsEl = document.getElementById('dots');

function getPos(i) {
  const len = programs.length;
  const diff = (i - current + len) % len;
  if (diff === 0)               return 'center';
  if (diff === 1)               return 'right';
  if (diff === len - 1)         return 'left';
  if (diff === 2)               return 'hidden-right';
  if (diff === len - 2)         return 'hidden-left';
  return diff < len / 2 ? 'hidden-right' : 'hidden-left';
}

function buildCards() {
  stage.innerHTML = '';
  programs.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'prog-card';
    card.dataset.index = i;
    card.innerHTML = `
      <div style="position:relative;width:100%;aspect-ratio:1/1;overflow:hidden;border-radius:18px 18px 0 0;">
        <img src="${p.photo}" alt="${p.name}" style="width:100%;height:100%;object-fit:contain;object-position:center;display:block;transition:transform .4s ease;" onmouseover="this.style.transform='scale(1.04)'" onmouseout="this.style.transform='scale(1)'">
      </div>
      <div class="card-body">
        <div class="card-time"><span class="card-dot"></span>${p.time}</div>
        <div class="card-prog">${p.name}</div>
        <div class="card-loc">🎙 ${p.dj}</div>
      </div>
    `;
    card.addEventListener('click', () => { goTo(i); resetTimer(); });
    stage.appendChild(card);
  });
  updatePositions();
}

function buildDots() {
  dotsEl.innerHTML = '';
  programs.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === current ? ' active' : '');
    d.addEventListener('click', () => { goTo(i); resetTimer(); });
    dotsEl.appendChild(d);
  });
}

function buildDots() {
  dotsEl.innerHTML = '';
  programs.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === current ? ' active' : '');
    dotsEl.appendChild(d);
  });
}

function updatePositions() {
  stage.querySelectorAll('.prog-card').forEach((card, i) => {
    card.dataset.pos = getPos(i);
  });
  dotsEl.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === current);
  });
}

function goTo(idx) {
  current = (idx + programs.length) % programs.length;
  updatePositions();
}

// ─── PROGRESS BAR ───
function resetTimer() {
  clearInterval(autoTimer);
  autoTimer = setInterval(() => {
    goTo(current + 1);
  }, INTERVAL);
}

// ─── INIT ───
buildCards();
buildDots();
resetTimer();

// ─── AO VIVO / AUTODJ DETECTION ───
const STATUS_URL = 'https://hts02.brascast.com:11000/status-json.xsl';
const badge  = document.getElementById('aovivoBadge');
const textEl = document.getElementById('aovivoText');

async function checkStatus() {
  try {
    const res  = await fetch(STATUS_URL, { cache: 'no-store' });
    const data = await res.json();
    const sources = data?.icestats?.source;
    const source  = Array.isArray(sources) ? sources[0] : sources;
    const title   = (source?.title || '').toLowerCase();
    const isAutoDJ = !source || title.includes('autodj') || title === '';
    if (isAutoDJ) {
      badge.classList.add('autodj');
      textEl.textContent = 'AUTODJ';
    } else {
      badge.classList.remove('autodj');
      textEl.textContent = 'AO VIVO';
    }
  } catch {
    badge.classList.add('autodj');
    textEl.textContent = 'AUTODJ';
  }
}

checkStatus();
setInterval(checkStatus, 30000);

</script>
</body>
</html>
